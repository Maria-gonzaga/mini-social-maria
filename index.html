<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Mini Social</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <h1 class="logo">Mini Social</h1>
    </header>

    <main class="feed">
      <article class="post">
        <div class="post-header">
          <img
            src="assets/linda-mulher-africana-retrato-do-rosto-de-perto_53876-148041.avif"
            class="avatar"
          />
          <div>
            <span class="name">Maria vitoriaDev</span>
            <span class="username">@mariavitoria</span>
          </div>
        </div>

        <p class="post-text">
          sonhe alto porque baixo vc não consegue
        </p>

        <div class="post-actions">
          <button id="likeBtn">Curtir</button>
          <span id="likeCount">0</span>
        </div>

        <section class="comments">
          <div class="comment">
            <img src="assets/avatar.png" class="avatar-small" />
            <img src="assets/avatar.png" class="avatar-small" />
            <p>vamos fazer um bolo de banana !</p>
          </div>
        </section>
      </article>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
