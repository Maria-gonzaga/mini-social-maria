<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mini Social</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #959faf;
  margin: 0;
}

header {
  background: #4e2b47;
  color: white;
  padding: 15px;
  text-align: center;
}

.feed {
  max-width: 500px;
  margin: 20px auto;
}

.post {
  background: rgb(148, 66, 117));
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.post-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 50px;
  border-radius: 50%;
}

.name {
  font-weight: bold;
}

.username {
  color: rgb(88, 73, 110);
  font-size: 14px;
}

.post-text {
  margin: 15px 0;
}

.post-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

button {
  border: none;
  padding: 8px 12px;
  border-radius: 20px;
  cursor: pointer;
}

.likeBtn {
  background: #4e7686;
}

.dislikeBtn {
  background: #5f7d8a;
}

.liked {
  background: hsl(246, 30%, 51%);
  color: white;
}

.disliked {
  background: #b37979;
  color: white;
}
</style>

</head>

<body>

<header>
  <h1>Mini Social 💜</h1>
</header>

<main class="feed">

  <article class="post">

    <div class="post-header">
      
     <img src="https://meioamargo.com/wp-content/uploads/2024/06/Bandida-Thumb-Light-1024x576.jpg" class="avatar">

      <div>
        <span class="name">maridapenha</span><br>
        <span class="username">@maridapenha</span>
      </div>
    </div>

    <p class="post-text">
      Hoje vamos fazer um bolo de leite conessado 👩‍💻🔥
    </p>

    <div class="post-actions">
      <button class="likeBtn">👍 Curtir</button>
      <button class="dislikeBtn">👎 Descurtir</button>
      <span class="likeCount">0</span>
    </div>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
